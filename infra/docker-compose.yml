version: '3.8'

services:
  # PostgreSQL: single shared instance for all bounded contexts (schemas created separately)
  postgres:
    image: postgres:17
    container_name: speckit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticketing
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init-schemas.sql:/docker-entrypoint-initdb.d/01-init-schemas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis: used for distributed locks and short-lived reservation keys
  redis:
    image: redis:7
    container_name: speckit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper: required by Confluent Kafka images
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: speckit-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    # Use Zookeeper 'ruok' command for a reliable health check
    healthcheck:
      test: ["CMD-SHELL", "bash -c \"echo ruok | nc -w 2 localhost 2181 | grep imok || exit 1\""]
      interval: 10s
      timeout: 10s
      retries: 10

  # Kafka (Confluent cp-kafka)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: speckit-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD-SHELL", "bash -c \"kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1\""]
      interval: 10s
      timeout: 15s
      retries: 12

  # Kafka topic initializer - runs on startup to create required topics
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: speckit-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        echo 'Waiting for Kafka to be ready...' &&
        until kafka-broker-api-versions --bootstrap-server kafka:9092 > /dev/null 2>&1; do
          sleep 1
        done &&
        echo 'Kafka is ready. Creating topics...' &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 1 --topic reservation-created &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 1 --topic reservation-expired &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 1 --topic payment-succeeded &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 1 --topic payment-failed &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 1 --topic ticket-issued &&
        echo 'Topics created successfully!' &&
        kafka-topics --list --bootstrap-server kafka:9092
      "
    restart: "no"

# Application services (built from repo for local development)
  identity:
    build:
      context: ..
      dockerfile: services/identity/src/Identity.Api/Dockerfile
    container_name: speckit-identity
    ports:
      - "50000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=ticketing;Username=postgres;Password=postgres;SearchPath=bc_identity;Include Error Detail=true
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy 

  catalog:
    build:
      context: ..
      dockerfile: services/catalog/src/Api/Dockerfile
    container_name: speckit-catalog
    ports:
      - "50001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=ticketing;Username=postgres;Password=postgres;SearchPath=bc_catalog;Include Error Detail=true
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  inventory:
    build:
      context: ..
      dockerfile: services/inventory/src/Inventory.Api/Dockerfile
    container_name: speckit-inventory
    ports:
      - "50002:5002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=ticketing;Username=postgres;Password=postgres;SearchPath=bc_inventory;Include Error Detail=true
      - ConnectionStrings__Redis=redis:6379
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  ordering:
    build:
      context: ..
      dockerfile: services/ordering/src/Api/Dockerfile
    container_name: speckit-ordering
    ports:
      - "5003:5003"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5003
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ticketing;Username=postgres;Password=postgres;SearchPath=bc_ordering;Include Error Detail=true
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  fulfillment:
    build:
      context: ..
      dockerfile: services/fulfillment/src/Api/Dockerfile
    container_name: speckit-fulfillment
    ports:
      - "50004:5004"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=ticketing;Username=postgres;Password=postgres;SearchPath=bc_fulfillment;Include Error Detail=true
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - fulfillment-data:/app/data/tickets
  payment:
    build:
      context: ..
      dockerfile: services/payment/src/Api/Dockerfile
    container_name: speckit-payment
    ports:
      - "5004:5004"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5004
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=ticketing;Username=postgres;Password=postgres;SearchPath=bc_payment;Include Error Detail=true
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

# Useful environment variables (for .NET apps or local dev use)
# Use these values when configuring your services' connection strings.
# Example POSTGRES_URL: Host=postgres;Port=5432;Database=ticketing;Username=postgres;Password=postgres
# Example REDIS_URL: redis:6379
# Example KAFKA_BOOTSTRAP_SERVERS: kafka:9092

networks:
  default:
    name: speckit-net

volumes:
  postgres-data:
  fulfillment-data:

# Notes:
# - This compose file is targeted for local development only.
# - Postgres data is mounted at ./data/postgres so it persists between restarts.
# - Healthchecks use simple TCP or client commands; adjust per your environment.
