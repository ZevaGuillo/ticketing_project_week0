openapi: 3.0.0
info:
  title: Payment Service API
  description: Payment processing and validation service
  version: 1.1.0
  contact:
    name: SpecKit Team

servers:
  - url: http://localhost:5004
    description: Development environment
  - url: https://api.speckit.local
    description: Production environment

paths:
  /payments:
    post:
      summary: Process payment
      description: Validate order state, re-check reservation, simulate charge, publish payment-succeeded or payment-failed event
      operationId: processPayment
      tags:
        - Payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orderId:
                  type: string
                  format: uuid
                customerId:
                  type: string
                  format: uuid
                reservationId:
                  type: string
                  format: uuid
                  description: Reservation ID to re-validate before charging
                amount:
                  type: number
                  format: decimal
                currency:
                  type: string
                  example: ARS
                  description: ISO 4217 currency code
                paymentMethod:
                  type: string
                  enum: [credit_card, debit_card, wallet]
              required:
                - orderId
                - customerId
                - amount
                - currency
                - paymentMethod
      responses:
        '200':
          description: Payment processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  paymentId:
                    type: string
                    format: uuid
                  orderId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [succeeded, failed, pending]
                  transactionId:
                    type: string
        '400':
          description: Invalid request or missing required fields
        '401':
          description: Payment not authorized for this customer
        '404':
          description: Order not found
        '422':
          description: Order in invalid state or payment declined
        '500':
          description: Payment processor error

  /payments/{paymentId}:
    get:
      summary: Get payment status
      operationId: getPaymentStatus
      tags:
        - Payment
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Payment status retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  paymentId:
                    type: string
                    format: uuid
                  orderId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [succeeded, failed, pending]
                  transactionId:
                    type: string
        '404':
          description: Payment not found

  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: Healthy
                  service:
                    type: string
                    example: Payment

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
