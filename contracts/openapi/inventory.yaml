openapi: 3.0.0
info:
  title: Inventory Service API
  description: Seat reservation and inventory management service
  version: 1.0.0
  contact:
    name: SpecKit Team

servers:
  - url: http://localhost:5002
    description: Development environment
  - url: https://api.speckit.local
    description: Production environment

paths:
  /reservations:
    post:
      summary: Create seat reservation
      description: Reserve a seat for 15 minutes. Acquires Redis lock, validates version, publishes reservation-created event.
      operationId: createReservation
      tags:
        - Inventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                eventId:
                  type: string
                  format: uuid
                seatId:
                  type: string
                  format: uuid
                customerId:
                  type: string
                  format: uuid
              required:
                - eventId
                - seatId
                - customerId
      responses:
        '201':
          description: Reservation created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  reservationId:
                    type: string
                    format: uuid
                  seatId:
                    type: string
                    format: uuid
                  expiresAt:
                    type: string
                    format: date-time
                  status:
                    type: string
                    enum: [active, expired, confirmed]
        '409':
          description: Seat already reserved
        '422':
          description: Version conflict (seat changed)
        '500':
          description: Internal server error

  /reservations/{reservationId}:
    get:
      summary: Get reservation details
      operationId: getReservation
      tags:
        - Inventory
      parameters:
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Reservation found
        '404':
          description: Reservation not found

  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
