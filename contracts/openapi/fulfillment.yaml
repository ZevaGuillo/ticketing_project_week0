openapi: 3.0.0
info:
  title: Fulfillment Service API
  description: Ticket generation service. Tickets are created automatically via the payment-succeeded Kafka event, not through a direct API call.
  version: 1.1.0
  contact:
    name: SpecKit Team

servers:
  - url: http://localhost:5005
    description: Development environment
  - url: https://api.speckit.local
    description: Production environment

paths:
  /tickets/{id}:
    get:
      summary: Download ticket as PDF
      description: |
        Retrieve a generated ticket. Supports two formats:
        - Pass a plain UUID to get ticket metadata.
        - Pass `{UUID}.pdf` to download the PDF file directly.
      operationId: getTicket
      tags:
        - Fulfillment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Ticket ID (UUID) or ticket ID with `.pdf` suffix to download the PDF
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6.pdf
      responses:
        '200':
          description: Ticket found. Returns PDF file when `.pdf` suffix is used, otherwise JSON metadata.
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: object
                properties:
                  ticketId:
                    type: string
                    format: uuid
                  ticketNumber:
                    type: string
                  pdfPath:
                    type: string
                  qrCode:
                    type: string
                  status:
                    type: string
                    enum: [generated, delivered, cancelled]
        '400':
          description: Invalid ticket ID format
        '404':
          description: Ticket not found

  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  service:
                    type: string
                    example: fulfillment

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
