openapi: 3.0.0
info:
  title: Fulfillment Service API
  description: Ticket generation and fulfillment service
  version: 1.0.0
  contact:
    name: SpecKit Team

servers:
  - url: http://localhost:5005
    description: Development environment
  - url: https://api.speckit.local
    description: Production environment

paths:
  /tickets:
    post:
      summary: Generate ticket
      description: Create ticket with PDF and QR code after successful payment
      operationId: generateTicket
      tags:
        - Fulfillment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentId:
                  type: string
                  format: uuid
                orderId:
                  type: string
                  format: uuid
                customerId:
                  type: string
                  format: uuid
                eventId:
                  type: string
                  format: uuid
              required:
                - paymentId
                - orderId
                - customerId
                - eventId
      responses:
        '201':
          description: Ticket generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticketId:
                    type: string
                    format: uuid
                  ticketNumber:
                    type: string
                  pdfPath:
                    type: string
                  qrCode:
                    type: string
                  status:
                    type: string
                    enum: [generated, delivered, cancelled]
        '422':
          description: Payment not successful or invalid
        '500':
          description: PDF/QR generation error

  /tickets/{ticketId}:
    get:
      summary: Get ticket details
      operationId: getTicket
      tags:
        - Fulfillment
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ticket found
        '404':
          description: Ticket not found

  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
