openapi: 3.0.0
info:
  title: Identity Service API
  description: Authentication and token generation service for SpecKit Ticketing
  version: 1.0.0
  contact:
    name: SpecKit Team

servers:
  - url: http://localhost:50000
    description: Development environment
  - url: https://api.speckit.local
    description: Production environment

paths:
  /token:
    post:
      summary: Issue JWT token
      description: Authenticate user by email and password, return JWT token
      operationId: issueToken
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: Password123!
              required:
                - email
                - password
      responses:
        '200':
          description: Token issued successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT access token
                  expiresAt:
                    type: string
                    format: date-time
                    description: Token expiration timestamp
                  userRole:
                    type: string
                    enum: [User, Admin]
                    description: User role for authorization
                  userEmail:
                    type: string
                    format: email
                    description: Authenticated user email
        '400':
          description: Invalid credentials
        '500':
          description: Internal server error

  /users:
    post:
      summary: Create a new user
      description: Register a new user with email and password
      operationId: createUser
      tags:
        - User Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: newuser@example.com
                password:
                  type: string
                  format: password
                  example: Password123!
                role:
                  type: string
                  enum: [User, Admin]
                  default: User
                  description: User role for authorization
              required:
                - email
                - password
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                    format: uuid
                    description: Unique identifier for the created user
                  email:
                    type: string
                    format: email
                    description: User email address
                  role:
                    type: string
                    enum: [User, Admin]
                    description: User role
        '400':
          description: Invalid request or user already exists
        '500':
          description: Internal server error

  /health:
    get:
      summary: Health check
      description: Check if identity service is running
      operationId: healthCheck
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, unhealthy]
        '503':
          description: Service is unavailable

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []