openapi: 3.0.0
info:
  title: Identity Service API
  description: Authentication and token generation service for SpecKit Ticketing
  version: 1.1.0
  contact:
    name: SpecKit Team

servers:
  - url: http://localhost:50000
    description: Development environment
  - url: https://api.speckit.local
    description: Production environment

paths:
  /auth/token:
    post:
      summary: Issue JWT token
      description: Authenticate user by email and password, return JWT token
      operationId: issueToken
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: Password123!
              required:
                - email
                - password
      responses:
        '200':
          description: Token issued successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT access token
                  expiresAt:
                    type: string
                    format: date-time
                    description: Token expiration timestamp
                  userRole:
                    type: string
                    enum: [User, Admin]
                    description: User role for authorization
                  userEmail:
                    type: string
                    format: email
                    description: Authenticated user email
        '400':
          description: Email is required or invalid request body
        '401':
          description: Invalid credentials

  /auth/register:
    post:
      summary: Register a new user
      description: Create a new user account with email, password, and optional role
      operationId: registerUser
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: newuser@example.com
                password:
                  type: string
                  format: password
                  example: Password123!
                role:
                  type: string
                  enum: [User, Admin]
                  default: User
                  description: User role for authorization
              required:
                - email
                - password
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                    format: uuid
                    description: Unique identifier for the created user
                  email:
                    type: string
                    format: email
                    description: User email address
                  role:
                    type: string
                    enum: [User, Admin]
                    description: User role
        '400':
          description: Invalid request, validation error, or user already exists

  /health:
    get:
      summary: Health check
      description: Check if identity service is running
      operationId: healthCheck
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  service:
                    type: string
                    example: identity

  /auth/health:
    get:
      summary: Auth health check
      description: Alternative health check endpoint for the auth subsystem
      operationId: authHealthCheck
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  service:
                    type: string
                    example: identity

  /internal/users/{id}:
    get:
      summary: Get user by ID (internal)
      description: Internal endpoint used by the gateway to resolve user details from JWT claims. Not exposed publicly.
      operationId: getInternalUser
      tags:
        - Internal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: User identifier
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                    format: uuid
                  email:
                    type: string
                    format: email
        '404':
          description: User not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT