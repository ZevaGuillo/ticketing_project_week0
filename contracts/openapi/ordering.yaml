openapi: 3.0.0
info:
  title: Ordering Service API
  description: Shopping cart and order management service
  version: 1.1.0
  contact:
    name: SpecKit Team

servers:
  - url: http://localhost:5003
    description: Development environment
  - url: https://api.speckit.local
    description: Production environment

paths:
  /cart/add:
    post:
      summary: Add reservation to cart
      description: Add a valid reservation to the customer's shopping cart. Creates an order in draft state.
      operationId: addToCart
      tags:
        - Ordering
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reservationId:
                  type: string
                  format: uuid
                  description: The reservation ID obtained from the inventory service
                seatId:
                  type: string
                  format: uuid
                price:
                  type: number
                  format: decimal
                userId:
                  type: string
                  format: uuid
                  description: Authenticated user ID. Mutually exclusive with guestToken.
                guestToken:
                  type: string
                  description: Guest session token. Mutually exclusive with userId.
                userEmail:
                  type: string
                  format: email
                  description: Customer email address
                eventName:
                  type: string
                  description: Name of the event for display purposes
                seatLabel:
                  type: string
                  description: Human-readable seat label (e.g. "VIP - A1")
              required:
                - reservationId
                - seatId
                - price
                - eventName
                - seatLabel
      responses:
        '200':
          description: Item added to cart, order created in draft state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Invalid request or reservation already in use

  /orders/checkout:
    post:
      summary: Checkout an order
      description: Transition a draft order to pending_payment state, making it ready for payment processing.
      operationId: checkout
      tags:
        - Ordering
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orderId:
                  type: string
                  format: uuid
                  description: The order ID to checkout
                userId:
                  type: string
                  format: uuid
                  description: Authenticated user ID. Mutually exclusive with guestToken.
                guestToken:
                  type: string
                  description: Guest session token. Mutually exclusive with userId.
              required:
                - orderId
      responses:
        '200':
          description: Order checked out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Invalid request or order not in draft state
        '401':
          description: Order does not belong to the provided userId or guestToken
        '404':
          description: Order not found

  /orders/{id}:
    get:
      summary: Get order by ID
      description: Retrieve the details of a specific order
      operationId: getOrder
      tags:
        - Ordering
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Order identifier
      responses:
        '200':
          description: Order retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderId:
                    type: string
                    format: uuid
                  customerEmail:
                    type: string
                    format: email
                  eventId:
                    type: string
                    format: uuid
                  eventName:
                    type: string
                  seatNumber:
                    type: string
                  price:
                    type: number
                    format: decimal
                  currency:
                    type: string
                    example: ARS
        '404':
          description: Order not found

  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: Healthy
                  service:
                    type: string
                    example: Ordering

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Order:
      type: object
      properties:
        orderId:
          type: string
          format: uuid
        status:
          type: string
          enum: [draft, pending_payment, confirmed, cancelled]
        customerEmail:
          type: string
          format: email
        eventName:
          type: string
        seatLabel:
          type: string
        price:
          type: number
          format: decimal
        currency:
          type: string
          example: ARS
