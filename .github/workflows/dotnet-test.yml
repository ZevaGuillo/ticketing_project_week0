name: Dotnet Test

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      test_type:
        required: true
        type: string # unit, integration, architecture

jobs:
  test:
    name: "dotnet test (${{ inputs.test_type }}): ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run Specific Tests with Coverage
        run: |
          SERVICE_DIR=$(dirname "${{ inputs.service_path }}")
          TEST_DIR="$SERVICE_DIR/tests/${{ inputs.test_type }}"
          
          if [ -d "$TEST_DIR" ]; then
            echo "Running ${{ inputs.test_type }} tests in $TEST_DIR with Coverage"
            # Solo aplicamos cobertura a Unit e Integration. Architecture no suele requerirla.
            if [[ "${{ inputs.test_type }}" != "architecture" ]]; then
              dotnet test $TEST_DIR --configuration Release                 --collect:"XPlat Code Coverage"                 --results-directory ./coverage-results/${{ inputs.test_type }}                 -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
            else
              dotnet test $TEST_DIR --configuration Release
            fi
          else
            echo "Skipping: No ${{ inputs.test_type }} tests found"
          fi

      - name: Upload Coverage Artifacts
        if: inputs.test_type != 'architecture'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.service_name }}-${{ inputs.test_type }}
          path: ./coverage-results/
          retention-days: 1
