name: Dotnet Test

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      test_type:
        required: true
        type: string # unit, integration, architecture

jobs:
  test:
    name: "dotnet test (${{ inputs.test_type }}): ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run Specific Tests with Coverage
        run: |
          SERVICE_DIR=$(dirname "${{ inputs.service_path }}")
          TEST_DIR="$SERVICE_DIR/tests/${{ inputs.test_type }}"
          
          if [ -d "$TEST_DIR" ]; then
            echo "Running ${{ inputs.test_type }} tests in $TEST_DIR with Coverage"
            if [[ "${{ inputs.test_type }}" != "architecture" ]]; then
              # Usamos una carpeta local relativa al workspace para evitar problemas de permisos o rutas absolutas
              mkdir -p test-results-output
              
              dotnet test $TEST_DIR --configuration Release                 --collect:"XPlat Code Coverage"                 --results-directory ./test-results-output                 -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
              
              echo "Contenido detectado en test-results-output:"
              find test-results-output -type f -name "*.xml"
            else
              dotnet test $TEST_DIR --configuration Release
            fi
          else
            echo "Skipping: No ${{ inputs.test_type }} tests found"
          fi

      - name: Upload Coverage Artifacts
        if: inputs.test_type != 'architecture'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.service_name }}-${{ inputs.test_type }}
          # Usamos un wildcard para asegurar que suba los archivos aunque .NET cree subcarpetas con GUIDs
          path: test-results-output/**/*.xml
          if-no-files-found: error
          retention-days: 1
