name: Trivy Scan Template

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      dockerfile_path:
        required: true
        type: string

jobs:
  scan:
    name: "Trivy: ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build local image for scanning
        run: |
          docker build -t app/${{ inputs.service_name }}:latest -f ${{ inputs.dockerfile_path }} .

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'app/${{ inputs.service_name }}:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
