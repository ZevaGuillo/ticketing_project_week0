name: CI - Smoke Migrations

on:
  push:
    branches:
      - main
      - develop
      - master
      - '001-ticketing-mvp'
  pull_request:
    branches:
      - main
      - develop
      - master

jobs:
  smoke-migrations:
    name: Test Infrastructure Setup & Migrations
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: |
          cd services/identity
          dotnet restore

      - name: Build Solution
        run: |
          cd services/identity
          dotnet build --no-restore --configuration Release

      - name: Run Smoke Migration Tests
        run: |
          cd services/identity
          dotnet test tests/Identity.IntegrationTests/Identity.IntegrationTests.csproj \
            --no-restore \
            --no-build \
            --configuration Release \
            --logger "console;verbosity=detailed" \
            --filter "Category=SmokeTest"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: services/identity/**/TestResults/
